apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "finance-ai.fullname" . }}-frontend-nginx
  labels:
    {{- include "finance-ai.labels" . | nindent 4 }}
data:
  default.conf: |
    server {
      listen 8080;
      server_name _;
      root /usr/share/nginx/html;
      index index.html;
      location /api/ {
        proxy_pass http://{{ include "finance-ai.fullname" . }}-backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
      }
      location = /health { access_log off; return 200 "ok"; }
      location / { try_files $uri $uri/ /index.html; }
    }
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "finance-ai.fullname" . }}-frontend
  labels:
    {{- include "finance-ai.labels" . | nindent 4 }}
spec:
  type: {{ .Values.frontend.service.type }}
  selector:
    {{- include "finance-ai.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
  ports:
    - name: http
      port: {{ .Values.frontend.service.port }}
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "finance-ai.fullname" . }}-frontend
  labels:
    {{- include "finance-ai.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.frontend.replicaCount }}
  selector:
    matchLabels:
      {{- include "finance-ai.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: frontend
  template:
    metadata:
      labels:
        {{- include "finance-ai.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: frontend
    spec:
      imagePullSecrets:
        {{- toYaml .Values.imagePullSecrets | nindent 8 }}
      containers:
        - name: frontend
          image: "{{ .Values.frontend.image.repository }}:{{ .Values.frontend.image.tag }}"
          imagePullPolicy: {{ .Values.frontend.image.pullPolicy }}
          ports: [{ name: http, containerPort: 8080 }]
          resources:
            {{- toYaml .Values.frontend.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.frontend.securityContext | nindent 12 }}
          readinessProbe:
            httpGet: { path: /health, port: http }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /health, port: http }
            initialDelaySeconds: 15
            periodSeconds: 20
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-runtime
              mountPath: /var/run
      volumes:
        - name: nginx-config
          configMap: { name: {{ include "finance-ai.fullname" . }}-frontend-nginx }
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-runtime
          emptyDir: {}
