apiVersion: v1
kind: Service
metadata:
  name: {{ include "finance-ai.fullname" . }}-database
  labels:
    {{- include "finance-ai.labels" . | nindent 4 }}
spec:
  clusterIP: None
  selector:
    {{- include "finance-ai.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: database
  ports:
    - name: postgresql
      port: 5432
      targetPort: postgresql
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "finance-ai.fullname" . }}-database
  labels:
    {{- include "finance-ai.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "finance-ai.fullname" . }}-database
  replicas: 1
  selector:
    matchLabels:
      {{- include "finance-ai.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: database
  template:
    metadata:
      labels:
        {{- include "finance-ai.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: database
    spec:
      securityContext:
        fsGroup: 999
      containers:
        - name: postgresql
          image: {{ .Values.database.image | quote }}
          ports:
            - name: postgresql
              containerPort: 5432
          envFrom:
            - secretRef:
                name: {{ include "finance-ai.fullname" . }}-database
          resources:
            {{- toYaml .Values.database.resources | nindent 12 }}
          readinessProbe:
            exec: { command: ["sh", "-c", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"] }
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec: { command: ["sh", "-c", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"] }
            initialDelaySeconds: 15
            periodSeconds: 10
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.database.storageClass }}
        storageClassName: {{ .Values.database.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.database.storage }}
