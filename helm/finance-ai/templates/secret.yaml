apiVersion: v1
kind: Secret
metadata:
  name: {{ include "finance-ai.fullname" . }}-app
  labels:
    {{- include "finance-ai.labels" . | nindent 4 }}
type: Opaque
stringData:
  SECRET_KEY: {{ required "secrets.secretKey must be set" .Values.secrets.secretKey | quote }}
  OPENAI_API_KEY: {{ .Values.secrets.openaiApiKey | quote }}
  OPENAI_MODEL: {{ .Values.secrets.openaiModel | quote }}
  DATABASE_URL: {{ printf "postgresql://%s:%s@%s-database:5432/%s" .Values.database.user .Values.database.password (include "finance-ai.fullname" .) .Values.database.name | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "finance-ai.fullname" . }}-database
  labels:
    {{- include "finance-ai.labels" . | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_DB: {{ .Values.database.name | quote }}
  POSTGRES_USER: {{ .Values.database.user | quote }}
  POSTGRES_PASSWORD: {{ required "database.password must be set" .Values.database.password | quote }}
